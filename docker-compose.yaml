services:
  gopher-email:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gopher-email
    command: ["run", "--config", "/app/config.yaml", "--verbose"]
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
      - gopher-email-data:/app/data

volumes:
  gopher-email-data:
    external: true
    name: gopher-email-data
